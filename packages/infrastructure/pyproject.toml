[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "finrag-infra"
version = "0.1.0"
description = "FinRAG infrastructure adapters"
requires-python = ">=3.11"
dependencies = [
    "finrag-core",
    "sqlalchemy>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.1",
    "boto3>=1.34.0",
    "chromadb>=0.5.0",
    "openai>=1.30.0",
    "pypdf>=4.2.0",
    "langchain-text-splitters>=0.2.0",
    "redis[asyncio]>=5.0.0",
    "tenacity>=8.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/finrag_infra"]
