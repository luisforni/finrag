[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "finrag-api"
version = "0.1.0"
description = "FinRAG FastAPI application"
requires-python = ">=3.11"
dependencies = [
    "finrag-core",
    "finrag-infra",
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "python-multipart>=0.0.9",
    "slowapi>=0.1.9",
    "httpx>=0.27.0",
    "arq>=0.26.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/finrag_api"]
